<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Portal - Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>
<body class="d-flex flex-column min-vh-100 bg-black text-white">
<div id="layoutRoot" class="d-flex flex-column min-vh-100">
    <header id="header"></header>

    <main class="flex-grow-1">
        <div class="dashboard-wrapper d-flex">
            <!-- Vertical sidebar -->
            <nav id="sidebar" class="sidebar bg-dark border-end border-secondary">
                <div class="sidebar-inner">
                    <div class="sidebar-logo mb-4 text-center">
                        <span class="sidebar-icon me-2">
                            <i class="bi bi-briefcase"></i>
                        </span>
                        <span class="sidebar-label">Job Portal</span>
                    </div>

                    <ul class="nav flex-column sidebar-menu">
                        <!-- Populated by dashboard.js based on role -->
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <section class="flex-grow-1 p-4" id="pageContent">
                <div class="container-fluid">
                    <!-- Role-based content will be rendered here by dashboard.js -->
                </div>
            </section>
        </div>
    </main>

    <footer id="footer"></footer>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/dashboard.js"></script>
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
></script>
</body>
</html>
