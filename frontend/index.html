<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Portal - Home</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/global.css" />
</head>
<body class="d-flex flex-column min-vh-100 bg-black text-white">
<div id="layoutRoot" class="d-flex flex-column min-vh-100">
    <!-- Header + main content will be injected by layout.js -->
    <header id="header"></header>

    <main class="flex-grow-1">
        <div class="container py-4" id="pageContent">
            <!-- Page-specific content -->
            <section class="text-center mb-5">
                <h1 class="display-5 fw-bold text-white">Find Your Next Role</h1>
                <p class="lead text-muted">
                    A minimal, clean job portal built with FastAPI &amp; Bootstrap.
                </p>
            </section>

            <section>
                <div class="row g-4" id="homeCards">
                    <!-- Landing jobs will be rendered here by landing.js -->
                </div>
            </section>
        </div>
    </main>

    <footer id="footer"></footer>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/landing.js"></script>
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
></script>
</body>
</html>
