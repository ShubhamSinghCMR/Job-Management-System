<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Portal – Home</title>
  <!-- Google Font: Source Sans Pro -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <!-- Theme style (AdminLTE 3) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css" />
  <link rel="stylesheet" href="assets/css/app.css" />
  <link rel="stylesheet" href="assets/css/home.css" />
</head>
<body class="hold-transition layout-top-nav layout-public page-home">
<div class="wrapper">
  <div id="header"></div>
  <div class="content-wrapper" style="margin-left: 0;">
    <section class="home-hero">
      <div class="container">
        <h1 class="hero-title">Find your next opportunity</h1>
        <p class="hero-subtitle">Discover roles that match your skills. Sign in or join to apply and manage your applications.</p>
      </div>
    </section>
    <section class="content">
      <div class="home-content" id="pageContent">
        <div class="home-search-wrap">
          <input type="text" id="homeSearch" class="home-search-input" placeholder="Search jobs by title, location, or description..." autocomplete="off" />
          <i class="fas fa-search home-search-icon" aria-hidden="true"></i>
        </div>
        <div id="searchResultsSection" class="home-search-results-section" style="display: none;">
          <h2 class="home-section-title">Search results</h2>
          <div class="home-job-cards">
            <div class="row" id="searchResultsCards"></div>
          </div>
        </div>
        <h2 class="home-section-title">Latest Jobs</h2>
        <div class="home-job-cards">
        <div class="row" id="homeCards">
          <!-- Landing jobs rendered by landing.js -->
        </div>
        </div>
      </div>
    </section>
  </div>
  <div id="footer"></div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/landing.js"></script>
</body>
</html>
