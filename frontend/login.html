<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Portal – Login</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css" />
  <link rel="stylesheet" href="assets/css/app.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body class="hold-transition layout-top-nav layout-public page-login">
<div class="wrapper">
  <div id="header"></div>
  <div class="content-wrapper" style="margin-left: 0;">
    <section class="content">
      <div class="container-fluid">
        <div class="row justify-content-center">
          <div class="col-12 col-sm-11 col-md-8 col-lg-6 col-xl-5">
            <div class="login-wrap">
              <div class="card login-card">
                <div class="card-header">
                  <h1 class="card-title">Sign in</h1>
                </div>
                <div class="card-body">
                  <div id="loginError" class="alert alert-danger alert-login d-none" role="alert"></div>
                  <form id="loginForm" novalidate>
                    <div class="form-group">
                      <label for="email">Email</label>
                      <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
                    </div>
                    <div class="form-group">
                      <label for="password">Password</label>
                      <input type="password" id="password" class="form-control" placeholder="Password" autocomplete="current-password" />
                    </div>
                    <button type="submit" class="btn btn-login">Sign in</button>
                  </form>
                  <p class="card-footer-link">
                    Don't have an account? <a href="register.html">Create account</a>
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <div id="footer"></div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
