<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Portal - Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/global.css" />
</head>
<body class="d-flex flex-column min-vh-100 bg-black text-white">
<div id="layoutRoot" class="d-flex flex-column min-vh-100">
    <header id="header"></header>

    <main class="flex-grow-1">
        <div class="container py-5" id="pageContent">
            <div class="row justify-content-center">
                <div class="col-md-4">
                    <div class="card bg-dark border-secondary shadow-sm p-4">
                        <h3 class="mb-3 text-center text-white">Login</h3>
                        <p class="text-muted small text-center mb-4">
                            Sign in to access your dashboard.
                        </p>

                        <div id="loginError" class="alert alert-danger py-2 d-none"></div>

                        <form id="loginForm" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label text-white">Email</label>
                                <input
                                    type="email"
                                    id="email"
                                    class="form-control bg-black text-white border-secondary"
                                    required
                                />
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label text-white">Password</label>
                                <input
                                    type="password"
                                    id="password"
                                    class="form-control bg-black text-white border-secondary"
                                    required
                                />
                            </div>
                            <button type="submit" class="btn btn-light w-100">
                                Login
                            </button>
                        </form>

                        <p class="mt-3 mb-0 text-center text-muted small">
                            Don’t have an account?
                            <a href="register.html" class="link-light">Register</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/auth.js"></script>
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
></script>
</body>
</html>
