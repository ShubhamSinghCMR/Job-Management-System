<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Portal - Register</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/global.css" />
</head>
<body class="d-flex flex-column min-vh-100 bg-black text-white">
<div id="layoutRoot" class="d-flex flex-column min-vh-100">
    <header id="header"></header>

    <main class="flex-grow-1">
        <div class="container py-5" id="pageContent">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card bg-dark border-secondary shadow-sm p-4">
                        <h3 class="mb-3 text-center text-white">Create Account</h3>
                        <p class="text-muted small text-center mb-4">
                            Register as an Admin, Employer, or Jobseeker.
                        </p>

                        <div id="registerError" class="alert alert-danger py-2 d-none"></div>

                        <form id="registerForm" novalidate>
                            <div class="mb-3">
                                <label for="name" class="form-label text-white">Full Name</label>
                                <input
                                    type="text"
                                    id="name"
                                    class="form-control bg-black text-white border-secondary"
                                    required
                                />
                            </div>
                            <div class="mb-3">
                                <label for="regEmail" class="form-label text-white">Email</label>
                                <input
                                    type="email"
                                    id="regEmail"
                                    class="form-control bg-black text-white border-secondary"
                                    required
                                />
                            </div>
                            <div class="mb-3">
                                <label for="regPassword" class="form-label text-white">Password</label>
                                <input
                                    type="password"
                                    id="regPassword"
                                    class="form-control bg-black text-white border-secondary"
                                    required
                                />
                            </div>
                            <div class="mb-4">
                                <label for="role" class="form-label text-white">Role</label>
                                <select
                                    id="role"
                                    class="form-select bg-black text-white border-secondary"
                                    required
                                >
                                    <option value="">Select role</option>
                                    <option value="admin">Admin</option>
                                    <option value="employer">Employer</option>
                                    <option value="jobseeker">Jobseeker</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-light w-100">
                                Register
                            </button>
                        </form>

                        <p class="mt-3 mb-0 text-center text-muted small">
                            Already have an account?
                            <a href="login.html" class="link-light">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/auth.js"></script>
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
></script>
</body>
</html>
